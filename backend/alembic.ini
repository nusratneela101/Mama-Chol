# Alembic configuration for MAMA CHOL VPN backend

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for the generated file names
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during each revision generation
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
sourceless = false

# Version path separator; 'os' uses os.pathsep, 'space' uses a space, 'newline'
# uses os.linesep, 'colon' uses a colon, 'semicolon' uses a semicolon
version_path_separator = os

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# The SQLAlchemy database URL; overridden by env.py using settings
sqlalchemy.url = postgresql://user:pass@localhost/mama_chol


[post_write_hooks]
# Post-write hook to run ruff on new migration files
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/../.venv/bin/ruff
# ruff.options = --fix FILEPATH


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
