global
    maxconn 50000
    log stdout format raw local0

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend vpn_frontend
    bind *:443
    default_backend vpn_backend

backend vpn_backend
    balance roundrobin
    option tcp-check
    server hk1 127.0.0.1:10443 check
    server hk2 127.0.0.1:10444 check backup
