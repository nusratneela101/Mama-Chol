# MAMA CHOL VPN — Nginx Configuration
# Reverse proxy to FastAPI backend, static frontend, SSL, WebSocket, gRPC

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream FastAPI application
upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ───────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# ───────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mamachol.online www.mamachol.online;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ───────────────────────────────────────────────────────────────────────────────
# Main HTTPS server
# ───────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mamachol.online www.mamachol.online;

    # ── SSL / TLS (Let's Encrypt) ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mamachol.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mamachol.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/mamachol.online/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mamachol_access.log;
    error_log  /var/log/nginx/mamachol_error.log warn;

    # ── Static Frontend ───────────────────────────────────────────────────────
    root /opt/mama-chol/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── FastAPI REST API ──────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass         http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Apply stricter rate limiting to auth endpoints
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────────
    location /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;
    }

    # ── WebSocket — VMess WebSocket ───────────────────────────────────────────
    location /vmess-ws {
        proxy_pass         http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── gRPC — Trojan gRPC ────────────────────────────────────────────────────
    location /trojan-grpc {
        grpc_pass         grpc://127.0.0.1:10002;
        grpc_set_header   Host $host;
        grpc_read_timeout 3600s;
        grpc_send_timeout 3600s;
    }

    # ── Subscription endpoint (no rate limit for VPN clients) ─────────────────
    location /api/v1/sub/ {
        proxy_pass         http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
